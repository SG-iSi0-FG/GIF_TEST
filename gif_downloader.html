<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>X GIF 保存ツール</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap');

        :root {
            --primary: #1DA1F2;
            --primary-dark: #1a91da;
            --bg: #0f1419;
            --bg-secondary: #16202b;
            --border: #2f3336;
            --text: #eff5fb;
            --text-secondary: #71767b;
            --success: #31a24c;
            --error: #f4245e;
        }

        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #192734 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
            overflow-x: hidden;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
            animation: slideDown 0.6s ease-out;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary) 0%, #1f8fe7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .main-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
            animation: fadeUp 0.6s ease-out 0.1s both;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
            -webkit-appearance: none;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(29, 161, 242, 0.1);
            box-shadow: 0 0 0 3px rgba(29, 161, 242, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
            font-size: 13px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            -webkit-appearance: none;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(29, 161, 242, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.98);
            box-shadow: 0 2px 6px rgba(29, 161, 242, 0.2);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:active {
            background: rgba(255, 255, 255, 0.15);
        }

        .preview-section {
            margin-bottom: 24px;
            animation: fadeUp 0.6s ease-out 0.2s both;
        }

        .preview-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text);
        }

        .preview-container {
            width: 100%;
            max-height: 300px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 150px;
        }

        .preview-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .no-preview {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .message {
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            animation: slideDown 0.3s ease-out;
        }

        .message.success {
            background: rgba(49, 162, 76, 0.2);
            border: 1px solid var(--success);
            color: #31ff64;
        }

        .message.error {
            background: rgba(244, 36, 94, 0.2);
            border: 1px solid var(--error);
            color: #ff4a7f;
        }

        .message.info {
            background: rgba(29, 161, 242, 0.2);
            border: 1px solid var(--primary);
            color: #1da1f2;
        }

        .steps {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            font-size: 13px;
            line-height: 1.6;
            animation: fadeUp 0.6s ease-out 0.3s both;
        }

        .step-item {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .step-number {
            flex-shrink: 0;
            width: 24px;
            height: 24px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
        }

        .step-content {
            color: var(--text-secondary);
        }

        .step-content strong {
            color: var(--text);
        }

        .method-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            animation: fadeUp 0.6s ease-out 0.2s both;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .method-content {
            display: none;
        }

        .method-content.active {
            display: block;
        }

        .url-hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
            padding: 8px;
            background: rgba(29, 161, 242, 0.05);
            border-left: 2px solid var(--primary);
            border-radius: 4px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 24px;
            }

            .main-card {
                padding: 16px;
            }

            button {
                padding: 14px 16px;
                font-size: 15px;
            }
        }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            color: var(--text-secondary);
            font-size: 12px;
            margin-top: 40px;
            padding-bottom: 20px;
            animation: fadeUp 0.6s ease-out 0.4s both;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🎬</div>
            <h1>X GIF 保存ツール</h1>
            <p class="subtitle">X（旧Twitter）から GIF/動画をダウンロード</p>
        </header>

        <div id="message-container"></div>

        <div class="steps">
            <div class="step-item">
                <div class="step-number">1</div>
                <div class="step-content">X上でGIFのある<strong>投稿のURL</strong>をコピー</div>
            </div>
            <div class="step-item">
                <div class="step-number">2</div>
                <div class="step-content">下のフォームに<strong>URLを貼り付け</strong></div>
            </div>
            <div class="step-item">
                <div class="step-number">3</div>
                <div class="step-content">「<strong>メディアを抽出</strong>」をタップ</div>
            </div>
            <div class="step-item">
                <div class="step-number">4</div>
                <div class="step-content">表示されたGIF/動画を<strong>保存</strong></div>
            </div>
        </div>

        <div class="main-card">
            <div class="method-tabs">
                <button class="tab-btn active" data-method="url">URLから抽出</button>
                <button class="tab-btn" data-method="embed">埋め込みコード</button>
            </div>

            <div id="url-method" class="method-content active">
                <div class="input-group">
                    <label>投稿のURL</label>
                    <input type="text" id="post-url" placeholder="https://x.com/username/status/1234567890" />
                    <div class="url-hint">💡 例: https://x.com/username/status/1234567890</div>
                </div>
                <button class="btn-primary" onclick="downloadFromURL()">メディアを抽出</button>
            </div>

            <div id="embed-method" class="method-content">
                <div class="input-group">
                    <label>GIFの直接URL</label>
                    <textarea id="media-url" placeholder="https://pbs.twimg.com/..."></textarea>
                    <div class="url-hint">💡 GIFやMP4のURL（通常は開発者ツールから取得）</div>
                </div>
                <button class="btn-primary" onclick="downloadDirect()">ダウンロード</button>
            </div>
        </div>

        <div class="preview-section">
            <div class="preview-title">プレビュー</div>
            <div class="preview-container" id="preview-container">
                <div class="no-preview">メディアがここに表示されます</div>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-secondary" onclick="clearAll()">クリア</button>
        </div>
    </div>

    <div class="footer">
        <p>iPhoneからのアクセス対応 | プライベート・セキュア</p>
    </div>

    <script>
        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.method-content').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(this.dataset.method + '-method').classList.add('active');
            });
        });

        function showMessage(text, type = 'info') {
            const container = document.getElementById('message-container');
            const message = document.createElement('div');
            message.className = `message ${type}`;
            message.textContent = text;
            container.innerHTML = '';
            container.appendChild(message);
            setTimeout(() => message.remove(), 5000);
        }

        async function downloadFromURL() {
            const url = document.getElementById('post-url').value.trim();
            if (!url) {
                showMessage('URLを入力してください', 'error');
                return;
            }

            showMessage('メディア情報を取得中...', 'info');
            
            try {
                // X（Twitter）から直接メディアを取得するAPI
                const tweetId = extractTweetId(url);
                if (!tweetId) {
                    showMessage('無効なX投稿URLです', 'error');
                    return;
                }

                // nitter.net（オープンソースのTwitterクライアント）を使用
                const apiUrl = `https://nitter.net/api/graphql`;
                
                // または twimg.com のメディア取得を試みる
                await fetchMediaFromNitter(tweetId);

            } catch (error) {
                showMessage('メディア取得に失敗しました。埋め込みコード方式を試してください。', 'error');
                console.error(error);
            }
        }

        function extractTweetId(url) {
            const match = url.match(/status\/(\d+)/);
            return match ? match[1] : null;
        }

        async function fetchMediaFromNitter(tweetId) {
            try {
                const response = await fetch(`https://nitter.net/i/web/status/${tweetId}`);
                const text = await response.text();
                
                // HTMLからメディアURLを抽出
                const mediaMatch = text.match(/src="(https:\/\/pbs\.twimg\.com[^"]+)"/);
                if (mediaMatch) {
                    const mediaUrl = mediaMatch[1];
                    displayAndDownload(mediaUrl);
                    showMessage('メディアを取得しました！', 'success');
                } else {
                    showMessage('この投稿にメディアが見つかりません', 'error');
                }
            } catch (error) {
                // フォールバック：ユーザーに手動取得を促す
                showMessage('自動取得に失敗。以下の手順で手動取得できます:\n\n1. Xアプリで投稿を開く\n2. 画像/GIFを長押し\n3. URLをコピー\n4. 埋め込みコード方式に貼り付け', 'info');
            }
        }

        function downloadDirect() {
            const url = document.getElementById('media-url').value.trim();
            if (!url) {
                showMessage('URLを入力してください', 'error');
                return;
            }

            displayAndDownload(url);
        }

        function displayAndDownload(mediaUrl) {
            const container = document.getElementById('preview-container');
            container.innerHTML = '';

            if (mediaUrl.includes('.mp4') || mediaUrl.includes('video')) {
                const video = document.createElement('video');
                video.src = mediaUrl;
                video.controls = true;
                video.style.maxWidth = '100%';
                video.style.maxHeight = '100%';
                container.appendChild(video);
            } else {
                const img = document.createElement('img');
                img.src = mediaUrl;
                img.onerror = () => {
                    container.innerHTML = '<div class="no-preview">メディアの読み込みに失敗しました</div>';
                    showMessage('メディアの読み込みに失敗。URLが正しいか確認してください', 'error');
                };
                img.onload = () => {
                    showMessage('メディアを読み込みました！下のボタンで保存できます', 'success');
                    addDownloadButton(mediaUrl);
                };
                container.appendChild(img);
            }

            addDownloadButton(mediaUrl);
        }

        function addDownloadButton(mediaUrl) {
            // ダウンロードボタン
            const existing = document.querySelector('.btn-download');
            if (existing) existing.remove();

            const downloadBtn = document.createElement('button');
            downloadBtn.className = 'btn-primary btn-download';
            downloadBtn.textContent = '📥 保存';
            downloadBtn.style.marginTop = '12px';
            downloadBtn.style.width = '100%';

            downloadBtn.onclick = () => {
                // iPhoneでは共有シートを開く
                if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
                    // iOSの場合、画像を開いて保存させる
                    const a = document.createElement('a');
                    a.href = mediaUrl;
                    a.target = '_blank';
                    a.click();
                    showMessage('ブラウザで画像が開きました。「共有」から保存してください', 'info');
                } else {
                    // その他のデバイス
                    const a = document.createElement('a');
                    a.href = mediaUrl;
                    a.download = `gif-${Date.now()}`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    showMessage('ダウンロード完了！', 'success');
                }
            };

            const preview = document.getElementById('preview-container');
            preview.parentElement.insertBefore(downloadBtn, preview.nextSibling);
        }

        function clearAll() {
            document.getElementById('post-url').value = '';
            document.getElementById('media-url').value = '';
            document.getElementById('preview-container').innerHTML = '<div class="no-preview">メディアがここに表示されます</div>';
            document.querySelector('.btn-download')?.remove();
            document.getElementById('message-container').innerHTML = '';
        }

        // URLが貼り付けられたら自動で処理
        document.getElementById('media-url').addEventListener('change', function() {
            if (this.value.trim().startsWith('http')) {
                downloadDirect();
            }
        });
    </script>
</body>
</html>
